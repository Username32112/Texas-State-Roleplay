<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Server Stats | Texas State Roleplay</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="logo">Texas State Roleplay</div>

  <nav>
    <a href="index.html">Home</a>
    <a href="departments.html">Departments</a>
    <a href="stats.html">Server Stats</a>
    <a href="apply.html">Apply</a>
  </nav>
</header>

<section class="page">

  <h1>Live Server Statistics</h1>

  <div class="card" id="statsCard">
    <h2>🟡 Loading Server Data...</h2>

    <p>Players In Game: <b id="players">-</b></p>
    <p>Staff Online: <b id="staff">-</b></p>
    <p>Queue: <b id="queue">-</b></p>
    <p>Vehicles Active: <b id="vehicles">-</b></p>

    <p>Status: <b id="status">Checking...</b></p>
  </div>

</section>

<footer>
  <p>© 2026 Texas State Roleplay</p>
</footer>

<script>
async function loadStats() {
  try {

    // 🔵 ERLC API (replace later)
    const erlc = await fetch("https://YOUR_ERLC_API_ENDPOINT");
    const erlcData = await erlc.json();

    // 🟣 Melony API (staff online)
    const melony = await fetch("https://YOUR_MELONY_API_ENDPOINT");
    const melonyData = await melony.json();

    document.getElementById("players").innerText =
      erlcData.players ?? "0";

    document.getElementById("queue").innerText =
      erlcData.queue ?? "0";

    document.getElementById("vehicles").innerText =
      erlcData.vehicles ?? "0";

    document.getElementById("staff").innerText =
      melonyData.staffOnline ?? "0";

    document.getElementById("status").innerText =
      erlcData.status ?? "Online";

    document.getElementById("statsCard").innerHTML = `
      <h2>🟢 Live Server Status</h2>
      <p>Players In Game: <b>${erlcData.players ?? 0}</b></p>
      <p>Staff Online: <b>${melonyData.staffOnline ?? 0}</b></p>
      <p>Queue: <b>${erlcData.queue ?? 0}</b></p>
      <p>Vehicles Active: <b>${erlcData.vehicles ?? 0}</b></p>
      <p>Status: <b>${erlcData.status ?? "Online"}</b></p>
    `;

  } catch (err) {
    document.getElementById("statsCard").innerHTML =
      "<h2>🔴 Server Offline / API Error</h2>";
  }
}

loadStats();
setInterval(loadStats, 10000);
</script>

</body>
</html>
